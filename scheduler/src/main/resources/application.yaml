server:
  port: ${SERVER_PORT:9000}

spring:
  application:
    name: scheduler

  datasource:
    url: jdbc:postgresql://${DATABASE_HOST:localhost}:${DATABASE_PORT:5432}/${DATABASE_NAME:postgres}
    username: ${DATABASE_USERNAME:devuser}
    password: ${DATABASE_PASSWORD:devpass}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:3}
      minimum-idle: ${HIKARI_MIN_IDLE:1}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:600000}
      max-lifetime: ${HIKARI_MAX_LIFETIME:1800000}

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

url:
  callback:
    rankings: ${URL_CALLBACK_RANKINGS:http://localhost:8080/v1/callback/rankings}
    places: ${URL_CALLBACK_PLACES:http://localhost:8080/v1/callback/places}
    keywords: ${URL_CALLBACK_KEYWORDS:http://localhost:8080/v1/callback/keywords}
