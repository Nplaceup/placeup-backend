<div th:fragment="header"
     xmlns:th="http://www.thymeleaf.org"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <header>
        <span>Dontworry Admin</span>

        <span style="float:right;" sec:authorize="isAuthenticated()">
            <span sec:authentication="name"></span>
            |

            <!-- Logout: POST + CSRF -->
        <form th:action="@{/admin/logout}" method="post" style="display:inline; margin:0; padding:0;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit"
                    style="background:none; border:none; padding:0; color:white; cursor:pointer; text-decoration:underline;">
                Logout
            </button>
        </form>
        </span>
    </header>
</div>
