<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(content)">

<head>
    <meta charset="UTF-8"/>
    <title>Dontworry Admin</title>
    <style>
        body { margin:0; font-family: Arial, sans-serif; }
        header { background:#222; color:white; padding:15px; }
        nav { width:220px; background:#f4f4f4; height:100vh; float:left; padding:15px; }
        main { margin-left:240px; padding:20px; }
        a { text-decoration:none; display:block; margin-bottom:10px; color:#333; }
        a:hover { font-weight:bold; }
    </style>
</head>

<body>

<!-- Header -->
<div th:replace="layout/header :: header"></div>

<!-- Sidebar -->
<div th:replace="layout/sidebar :: sidebar"></div>

<!-- Main Content -->
<main>
    <div th:replace="${content}"></div>
</main>

</body>
</html>
