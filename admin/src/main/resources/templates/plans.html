<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout :: layout(~{::content})}">

<div th:fragment="content">
  <h2>플랜 리스트 (plan_history)</h2>

  <form th:action="@{/admin/plans}" method="get"
        style="margin: 12px 0; display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
    <input type="hidden" name="size" th:value="${size}"/>
    <input type="hidden" name="sort" th:value="${sort}"/>
    <input type="hidden" name="dir" th:value="${dir}"/>

    <input type="number" name="userId" placeholder="userId(선택)"
           th:value="${userId}" style="width:170px; padding:6px;"/>

    <button type="submit" style="padding:6px 12px;">조회</button>
    <a th:href="@{/admin/plans(size=${size}, sort=${sort}, dir=${dir})}"
       style="padding:6px 12px; border:1px solid #ccc; text-decoration:none;">초기화</a>
  </form>

  <table border="1" cellpadding="8" style="width:100%; border-collapse:collapse;">
    <thead>
    <tr style="background:#f6f6f6;">
      <th style="width:80px;">id</th>
      <th style="width:140px;">planTier</th>
      <th style="width:180px;">planStartDate</th>
      <th style="width:180px;">planEndDate</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="ph : ${items}">
      <td th:text="${ph.id}">1</td>
      <td th:text="${ph.planTier}">PRO</td>
      <td th:text="${ph.planStartDate != null ? #temporals.format(ph.planStartDate, 'yyyy-MM-dd HH:mm:ss') : '-'}">-</td>
      <td th:text="${ph.planEndDate != null ? #temporals.format(ph.planEndDate, 'yyyy-MM-dd HH:mm:ss') : '-'}">-</td>
    </tr>

    <tr th:if="${items == null or #lists.isEmpty(items)}">
      <td colspan="4" style="text-align:center; padding:16px;">조회된 플랜 이력이 없습니다.</td>
    </tr>
    </tbody>
  </table>

  <div style="margin-top: 14px; display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
    <a th:if="${pageObj.hasPrevious()}"
       th:href="@{/admin/plans(page=${pageObj.number-1}, size=${size}, sort=${sort}, dir=${dir}, userId=${userId})}"
       style="padding:6px 10px; border:1px solid #ccc; text-decoration:none;">이전</a>

    <span>
      <b th:text="${pageObj.number + 1}">1</b> / <span th:text="${pageObj.totalPages}">1</span>
      (총 <span th:text="${pageObj.totalElements}">0</span>건)
    </span>

    <a th:if="${pageObj.hasNext()}"
       th:href="@{/admin/plans(page=${pageObj.number+1}, size=${size}, sort=${sort}, dir=${dir}, userId=${userId})}"
       style="padding:6px 10px; border:1px solid #ccc; text-decoration:none;">다음</a>
  </div>
</div>
</html>
