server:
  port: ${SERVER_PORT:8080}

  tomcat:
    max-swallow-size: -1

spring:
  application:
    name: ${SPRING_APPLICATION_NAME:api}

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:20MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:100MB}

  cloud:
    aws:
      region:
        static: ${AWS_REGION}
      s3:
        bucket: ${AWS_S3_BUCKET}
      credentials:
        access-key: ${AWS_ACCESS_KEY}
        secret-key: ${AWS_SECRET_KEY}
      stack:
        auto: false

kakao:
  rest-api-key: ${KAKAO_REST_API_KEY}
  client-secret: ${KAKAO_CLIENT_SECRET}
  admin-key: ${KAKAO_ADMIN_KEY}

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    org.springframework.web.servlet.resource: OFF

app:
  s3:
    presign-expire-minutes: ${S3_PRESIGN_EXPIRE_MINUTES:10}
    upload-prefix: ${S3_UPLOAD_PREFIX:images}